<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harcama Ekle</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: white; border-radius: 16px; padding: 28px; width: 100%; max-width: 440px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
  h1 { font-size: 18px; font-weight: 600; color: #1a1a2e; margin-bottom: 6px; }
  .sub { font-size: 13px; color: #888; margin-bottom: 24px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .full { grid-template-columns: 1fr; }
  label { font-size: 12px; font-weight: 500; color: #555; display: block; margin-bottom: 5px; }
  input, select { width: 100%; padding: 9px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px; color: #222; outline: none; transition: border-color 0.15s; }
  input:focus, select:focus { border-color: #4f6ef7; }
  .btn { width: 100%; padding: 12px; background: #4f6ef7; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 6px; transition: background 0.15s; }
  .btn:hover { background: #3a56d4; }
  .btn:active { background: #2e46c0; transform: scale(0.99); }
  .status { margin-top: 14px; padding: 10px 14px; border-radius: 8px; font-size: 13px; display: none; }
  .ok { background: #eafaf1; color: #1e7e34; border: 1px solid #b7e4c7; display: block; }
  .err { background: #fdecea; color: #c0392b; border: 1px solid #f5c6cb; display: block; }
  .loading { background: #eef2ff; color: #4f6ef7; border: 1px solid #c5cffb; display: block; }
</style>
</head>
<body>
<div class="card">
  <h1>💸 Harcama Ekle</h1>
  <p class="sub">Finansal Takip Sistemi — Google Sheets</p>
  <div class="row">
    <div>
      <label>Tarih</label>
      <input type="date" id="tarih" />
    </div>
    <div>
      <label>Tutar (₺)</label>
      <input type="number" id="tutar" placeholder="0" min="0" step="0.01" />
    </div>
  </div>
  <div class="row full" style="margin-bottom:14px">
    <div>
      <label>Açıklama</label>
      <input type="text" id="aciklama" placeholder="örn. Migros market" />
    </div>
  </div>
  <div class="row">
    <div>
      <label>Kategori</label>
      <select id="kategori">
        <option value="Kira / İpotek">Kira / İpotek</option>
        <option value="Elektrik, Su, Doğalgaz">Elektrik, Su, Doğalgaz</option>
        <option value="İnternet & Telefon">İnternet & Telefon</option>
        <option value="Market & Gıda" selected>Market & Gıda</option>
        <option value="Ulaşım">Ulaşım</option>
        <option value="Sağlık & İlaç">Sağlık & İlaç</option>
        <option value="Sigorta">Sigorta</option>
        <option value="Dışarıda Yemek">Dışarıda Yemek</option>
        <option value="Eğlence & Etkinlik">Eğlence & Etkinlik</option>
        <option value="Giyim & Aksesuar">Giyim & Aksesuar</option>
        <option value="Hobi & Spor">Hobi & Spor</option>
        <option value="Abonelikler">Abonelikler</option>
        <option value="Diğer">Diğer</option>
      </select>
    </div>
    <div>
      <label>Ödeme Yöntemi</label>
      <select id="odeme">
        <option value="Kredi Kartı">Kredi Kartı</option>
        <option value="Nakit">Nakit</option>
        <option value="Havale">Havale</option>
        <option value="Banka Kartı">Banka Kartı</option>
      </select>
    </div>
  </div>
  <div class="row full" style="margin-bottom:6px">
    <div>
      <label>Not (opsiyonel)</label>
      <input type="text" id="not" placeholder="örn. Doğum günü hediyesi" />
    </div>
  </div>
  <button class="btn" onclick="gonder()">Sheets'e Ekle →</button>
  <div class="status" id="status"></div>
</div>
<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz9e8RQPHYEObaSCMdw5x3Q11EfGBoFQsDzC03UKNclcAIK_s-vXv4h7AtAVQhY2RgyfA/exec";
const today = new Date().toISOString().split("T")[0];
document.getElementById("tarih").value = today;
function formatTarih(val) {
  const [y, m, d] = val.split("-");
  return d + "." + m + "." + y;
}
function setStatus(type, msg) {
  const el = document.getElementById("status");
  el.className = "status " + type;
  el.textContent = msg;
}
function gonder() {
  const tarih    = document.getElementById("tarih").value;
  const tutar    = document.getElementById("tutar").value;
  const aciklama = document.getElementById("aciklama").value.trim();
  const kategori = document.getElementById("kategori").value;
  const odeme    = document.getElementById("odeme").value;
  const not      = document.getElementById("not").value.trim();
  if (!aciklama) return setStatus("err", "Açıklama boş bırakılamaz.");
  if (!tutar || Number(tutar) <= 0) return setStatus("err", "Geçerli bir tutar girin.");
  setStatus("loading", "Gönderiliyor...");
  const params = new URLSearchParams({ tarih: formatTarih(tarih), aciklama, kategori, tutar, odeme, not });
  fetch(SCRIPT_URL + "?" + params.toString())
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        setStatus("ok", "✓ Kaydedildi: " + aciklama + " — " + Number(tutar).toLocaleString("tr-TR") + " ₺");
        document.getElementById("aciklama").value = "";
        document.getElementById("tutar").value = "";
        document.getElementById("not").value = "";
        document.getElementById("tarih").value = today;
      } else {
        setStatus("err", "Hata: " + (data.hata || "Bilinmeyen hata"));
      }
    })
    .catch(() => setStatus("err", "Bağlantı hatası."));
}
document.addEventListener("keydown", e => { if (e.key === "Enter") gonder(); });
</script>
</body>
</html>
